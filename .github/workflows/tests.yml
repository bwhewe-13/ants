name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "1"

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install ".[dev]"

      - name: Build Cython extensions in place
        run: python setup.py build_ext --inplace

      - name: Decode energy sources
        env:
          ENERGY_SOURCES_B64: ${{ secrets.ENERGY_GRID_NPZ }}
        run: |
          if [ -n "$ENERGY_SOURCES_B64" ]; then
            mkdir -p ants/sources/energy
            echo "$ENERGY_SOURCES_B64" | base64 -d | tar -xz -C ants/sources/energy/
          fi

      - name: Run tests with coverage
        run: pytest -n auto --dist loadfile tests --cov=ants --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: bwhewe-13/ants
