name: CI

on:
  push:
  pull_request:

jobs:
  style:
    name: Style Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install style tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install black isort ruff

      - name: Run Black
        run: black --check ants tests examples docs/conf.py setup.py

      - name: Run isort
        run: isort --check-only ants tests examples docs/conf.py setup.py

      - name: Run Ruff
        run: ruff check ants tests examples docs/conf.py setup.py

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run smoke tests
        run: pytest tests -m smoke

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install sphinx sphinxcontrib-bibtex

      - name: Build docs with warnings as errors
        run: make -C docs html SPHINXOPTS="-W"
