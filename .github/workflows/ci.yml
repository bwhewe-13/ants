name: CI

on:
  push:
  pull_request:

jobs:
  style:
    name: Style Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install style tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install black isort flake8 pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run Black
        run: black --check ants tests examples docs/conf.py setup.py

      - name: Run isort
        run: isort --check-only ants tests examples docs/conf.py setup.py

      - name: Run Flake8
        run: flake8 ants tests examples docs/conf.py setup.py
